# Key decisions made during workflow
decisions:
  - decision: "Use Google OAuth 2.0 as authentication provider"
    rationale: "Supports enterprise G Suite accounts, widely adopted, excellent documentation"
    phase: planning
    decided_at: 2025-11-24T09:45:00Z

  - decision: "Store sessions in Redis cluster"
    rationale: "Horizontal scalability, session persistence across server restarts"
    phase: planning
    decided_at: 2025-11-24T10:15:00Z

  - decision: "Implement refresh token rotation"
    rationale: "Security best practice to limit impact of token theft"
    phase: planning
    decided_at: 2025-11-24T10:20:00Z

  - decision: "Use Passport.js with passport-google-oauth20 strategy"
    rationale: "Battle-tested library, Express middleware integration, active maintenance"
    phase: research
    decided_at: 2025-11-24T10:55:00Z

  - decision: "Implement PKCE (Proof Key for Code Exchange)"
    rationale: "Enhanced security even for confidential clients, OWASP recommendation"
    phase: research
    decided_at: 2025-11-24T11:15:00Z

  - decision: "Use httpOnly cookies for session tokens"
    rationale: "XSS mitigation, tokens not accessible via JavaScript"
    phase: research
    decided_at: 2025-11-24T11:28:00Z

  - decision: "Encrypt tokens at rest in Redis"
    rationale: "Defense in depth, protect against Redis data exposure"
    phase: research
    decided_at: 2025-11-24T11:35:00Z

  - decision: "Separate refresh_tokens table with foreign key to users"
    rationale: "Easier token rotation, revocation, and audit trail"
    phase: design
    decided_at: 2025-11-24T12:30:00Z

