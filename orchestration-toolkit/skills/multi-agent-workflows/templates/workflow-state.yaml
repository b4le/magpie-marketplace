# Workflow State Management

This file tracks the persistent state of the orchestrated workflow. It enables:
- **Resumption**: Resume workflow after interruption
- **Progress Tracking**: Monitor phase completion and token usage
- **Decision Logging**: Record key decisions for future reference
- **Agent Coordination**: Track active and completed agents

## Update Triggers

Update this file when:
1. Phase transitions (planning → research)
2. Agent launches or completes
3. Questions asked or answered
4. Key decisions made
5. Phases archived

## Reading This File

**Orchestrators**: Read to understand current state before launching agents
**Sub-agents**: Usually don't need to read (orchestrator passes relevant info)
**Cleanup agents**: Read to update archival timestamps

## Example Usage

```yaml
# After agent completes, update:
completed_agents:
  - id: agent-001
    phase: planning
    topic: requirements
    tokens_used: 12500
    output_paths:
      - active/planning/agent-001-requirements.md

metrics:
  total_agents_launched: 1
  total_tokens_used: 12500
```
